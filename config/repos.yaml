# PyAutoHeart polled-repo registry.
#
# Repos listed here are polled every `tick` for CI / drift / timing.
# Repos NOT listed are silently ignored. To add/remove a repo, edit
# this file and reload the daemon (`pyauto-heart stop && pyauto-heart watch`).

repos:
  libraries:
    - name: PyAutoConf
      owner: PyAutoLabs
    - name: PyAutoFit
      owner: PyAutoLabs
    - name: PyAutoArray
      owner: PyAutoLabs
    - name: PyAutoGalaxy
      owner: PyAutoLabs
    - name: PyAutoLens
      owner: PyAutoLabs

  build_workflow:
    - name: PyAutoBuild
      owner: PyAutoLabs
    - name: PyAutoMind
      owner: PyAutoLabs

  workspaces:
    - name: autofit_workspace
      owner: PyAutoLabs
    - name: autogalaxy_workspace
      owner: PyAutoLabs
    - name: autolens_workspace
      owner: PyAutoLabs

  workspaces_test:
    - name: autofit_workspace_test
      owner: PyAutoLabs
    - name: autogalaxy_workspace_test
      owner: PyAutoLabs
    - name: autolens_workspace_test
      owner: PyAutoLabs

  workspaces_developer:
    - name: autofit_workspace_developer
      owner: Jammy2211
    - name: autolens_workspace_developer
      owner: PyAutoLabs

  howto:
    - name: HowToFit
      owner: PyAutoLabs
    - name: HowToGalaxy
      owner: PyAutoLabs
    - name: HowToLens
      owner: PyAutoLabs

  pipelines:
    - name: euclid_strong_lens_modeling_pipeline
      owner: PyAutoLabs

  # The PyAuto "organism" repos — the reasoning/health/memory layer. Heart
  # watching itself (and its siblings) is intentional and useful: drift or a
  # red CI on these is just as real as on a library.
  organism:
    - name: PyAutoBrain
      owner: PyAutoLabs
    - name: PyAutoHeart
      owner: PyAutoLabs
    - name: PyAutoMemory
      owner: PyAutoLabs

# Required gating workflows per group, keyed by the GitHub Actions workflow
# *name* (the `name:` field, e.g. "Smoke Tests"), matched against
# `workflowName` from `gh run list`. `ci_status` records the conclusion of each
# of these on the `main` HEAD commit, and `readiness` gates (RED) on a failure
# of any of them. Groups absent here are observed but advisory — their latest
# run is recorded for the dashboard but never blocks a release.
#
# NOTE: url-checking is deliberately NOT a required workflow. It moved off the
# per-repo `url_check.yml` into PyAutoHeart's central `url-check.yml` sweep and
# is monitoring-only (see the URL HYGIENE block in status.py) — a forbidden-URL
# finding never gates a release, so a green `url_check` cannot mask a red
# `smoke_tests`.
required_workflows:
  libraries: ["Tests"]                              # main.yml (pytest, 3.12 + 3.13)
  workspaces: ["Smoke Tests", "Navigator Check"]    # smoke_tests.yml + navigator_check.yml
  workspaces_test: ["Smoke Tests"]                  # smoke_tests.yml
  howto: ["Smoke Tests", "Navigator Check"]         # smoke_tests.yml + navigator_check.yml

# Excluded — not polled. Listed here for documentation only.
excluded:
  - admin_jammy           # personal tooling
  - autolens_assistant    # public-facing template
  - autolens_profiling    # profiling project
  - z_help                # scratch
  - z_projects            # in-progress science
  - z_projects_complete   # archived science
  - z_staging             # staging area
  - z_vault               # archived material
  - scripts               # utility scripts (not a checkout)

# Regenerated artifacts that perpetually show as dirty in `git status`.
# A porcelain path matching any of these globs (or any untracked directory)
# is counted as "generated noise" — informational, NOT actionable — and is
# excluded from the dirty_yellow/dirty_red drift signal. Matched with
# fnmatch, where `*` crosses `/` (so `*.fits` matches dataset/.../x.fits).
# Tune freely; remove a pattern to make those changes surface as real drift.
#
# Deliberately FILE-TYPE scoped, not directory scoped: a blanket `dataset/*`
# or `*/results/*` rule would wrongly hide genuine hand-edited source — e.g.
# autolens_workspace_developer has real `.py` under `source_science/results/`.
# Matching by generated filename/extension keeps those `.py` edits visible.
noise_globs:
  - "*.fits"
  - "*tracer.json"          # tracer.json, g_tracer.json, r_tracer.json
  - "*point_dataset*.json"
  - "*positions.json"       # generated dataset positions (HowToLens etc.)
  - "*data.json"            # regenerated dataset payloads
  - "*model.json"           # model snapshots
  - "*model_*.json"         # model_0.json, model_1.json, …
  - "*max_log_likelihood.json"  # result snapshots
  - "*galaxies.json"        # generated dataset galaxies (HowTo*, *_test)
  - "*summary.json"         # generated profiling summaries (postfix_N*_summary.json)
  - "*comparison.json"      # jax_profiling result comparisons
  - "*hpc_*.json"           # jax_profiling HPC run results (hpc_a100_fp64/mp.json)
  - "*.png"                 # generated plots / figures (global; PNGs here are always generated)
  - "*README.md"            # build-regenerated workspace docs
  - "*test_report.md"

# Tunable thresholds for the regression classifier.
thresholds:
  script_timing:
    yellow_factor: 1.5    # latest / median > this → yellow
    red_factor: 3.0       # latest / median > this → red
    baseline_window: 7    # rolling-median window (last N runs)
  repo_drift:
    behind_yellow: 1      # 1+ commits behind → yellow
    behind_red: 20        # 20+ commits behind → red
    dirty_yellow: 1       # 1+ dirty files → yellow
    dirty_red: 50         # 50+ dirty files → red
  ci_status:
    failure_red: true     # any latest=failure → red
    in_progress_yellow: true
  worktree_drift:
    orphan_red: true      # orphan WT with uncommitted work → red
    orphan_yellow: true   # orphan WT (clean) → yellow
